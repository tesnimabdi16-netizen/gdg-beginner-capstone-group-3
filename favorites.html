<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="#" class="logo">🎬 movieo</a>
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="favorites.html">Favorites</a>
      <a href="watchlist.html">Watchlist</a>
    </div>
    <div class="nav-right">
      <button id="openSettings" class="settings-btn">⚙ Settings</button>
    </div>
  </nav>

  <div id="globalLoading" class="loading-overlay">
    <div class="loading"></div>
  </div>

  <h2>Your Favorites</h2>
  <div class="movie-row grid-layout" id="favoritesRow"></div>

  <div class="trailer-popup" id="trailerPopup">
    <div class="popup-content">
      <button id="closePopup">×</button>
      <iframe id="trailerFrame" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <div class="details-popup" id="detailsPopup">
    <div class="popup-content details-content">
      <div class="genre-bg fx-bg"></div>
      <button id="closeDetails">×</button>
      <img id="detailsPoster" src="" alt="Movie poster" />
      <div class="details-text">
        <span id="detailsGenreBadge" class="genre-badge">Movie</span>
        <h2 id="detailsTitle"></h2>
        <p id="detailsOverview"></p>

        <div class="details-grid">
          <div class="detail-chip"><strong>Release</strong><span id="detailsRelease"></span></div>
          <div class="detail-chip"><strong>Rating</strong><span id="detailsRating"></span></div>
          <div class="detail-chip"><strong>Runtime</strong><span id="detailsRuntime"></span></div>
          <div class="detail-chip"><strong>Status</strong><span id="detailsStatus"></span></div>
        </div>

        <div class="details-actions">
          <button id="detailsFavoriteBtn" class="favorite-btn">❤ Favorite</button>
          <button id="detailsWatchlistBtn" class="watchlist-btn">➕ Watchlist</button>
          <button id="detailsTrailerBtn" class="trailer-btn">▶ Trailer</button>
        </div>
      </div>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-box">
      <button id="closeSettings" class="close-settings">×</button>
      <h2>Settings</h2>

      <div class="setting-group">
        <label for="themeSelect">Theme Mode</label>
        <select id="themeSelect">
          <option value="default">Default</option>
          <option value="cinema">Cinema Purple</option>
          <option value="midnight">Midnight Blue</option>
          <option value="blood">Horror Red</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="cardSizeSelect">Card Size</label>
        <select id="cardSizeSelect">
          <option value="small">Compact</option>
          <option value="medium" selected>Balanced</option>
          <option value="large">Showcase</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="switch-wrap">
          <span>Hover Animations</span>
          <input type="checkbox" id="animToggle" checked />
        </label>
      </div>

      <div class="setting-group">
        <label class="switch-wrap">
          <span>Auto Hero Slider</span>
          <input type="checkbox" id="sliderToggle" checked />
        </label>
      </div>

      <button id="saveSettings" class="save-settings-btn">Save Settings</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
